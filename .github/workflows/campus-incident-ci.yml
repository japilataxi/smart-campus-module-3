name: Campus Incident Service CI

on:
  push:
    branches:
      - feature/campus-incident-service
      - dev
      - qa
      - main
    paths:
      - "apps/campus-incident-service/**"
      - "turbo.json"
      - ".github/workflows/campus-incident-ci.yml"

  pull_request:
    branches:
      - dev
      - qa
      - main
    paths:
      - "apps/campus-incident-service/**"
      - "turbo.json"
      - ".github/workflows/campus-incident-ci.yml"

jobs:
  campus-incident-ci:
    name: Build and Test Campus Incident Service
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npx turbo run test --filter=campus-incident-service

      - name: Build service
        run: npx turbo run build --filter=campus-incident-service
name: CD PROD

on:
  push:
    branches:
      - main

jobs:
  deploy-prod:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push web-app PROD
        run: |
          docker build \
            -t ${{ secrets.DOCKERHUB_USERNAME }}/web-app:prod \
            -f apps/web-app/Dockerfile \
            --build-arg NEXT_PUBLIC_API_URL=http://smart-campus-prod-alb-1847367067.us-east-1.elb.amazonaws.com/api \
            .
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/web-app:prod

      - name: Build and push api-gateway PROD
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/api-gateway:prod -f apps/api-gateway/Dockerfile .
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/api-gateway:prod

      - name: Build and push auth-service PROD
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/auth-service:prod -f apps/auth-service/Dockerfile .
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/auth-service:prod

      - name: Build and push library-service PROD
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/library-service:prod -f apps/library-service/Dockerfile .
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/library-service:prod

      - name: Build and push campus-incident-service PROD
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/campus-incident-service:prod -f apps/campus-incident-service/Dockerfile .
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/campus-incident-service:prod

      - name: Build and push notification-service PROD
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/notification-service:prod -f apps/notification-service/Dockerfile .
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/notification-service:prod
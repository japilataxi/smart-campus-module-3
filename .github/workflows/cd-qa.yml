name: CD QA

on:
  push:
    branches:
      - qa

jobs:
  deploy-qa:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Debug repository structure
        run: |
          pwd
          ls -la
          ls -la packages
          ls -la apps
          ls -la apps/web-app

      - name: Build and push web-app QA
        run: |
          docker build \
            -t ${{ secrets.DOCKERHUB_USERNAME }}/web-app:qa \
            -f apps/web-app/Dockerfile \
            --build-arg NEXT_PUBLIC_API_URL=http://smart-campus-qa-alb-1189508831.us-east-1.elb.amazonaws.com/api \
            .
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/web-app:qa

      - name: Build and push api-gateway QA
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/api-gateway:qa -f apps/api-gateway/Dockerfile .
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/api-gateway:qa

      - name: Build and push auth-service QA
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/auth-service:qa -f apps/auth-service/Dockerfile .
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/auth-service:qa

      - name: Build and push library-service QA
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/library-service:qa -f apps/library-service/Dockerfile .
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/library-service:qa

      - name: Build and push campus-incident-service QA
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/campus-incident-service:qa -f apps/campus-incident-service/Dockerfile .
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/campus-incident-service:qa
      
      - name: Build and push notification-service QA
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/notification-service:qa -f apps/notification-service/Dockerfile .
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/notification-service:qa
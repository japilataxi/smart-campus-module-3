name: CD QA

on:
  push:
    branches:
      - qa

jobs:
  deploy-qa:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push API Gateway
        run: |
          docker build -t japilataxi/api-gateway:qa -f apps/api-gateway/Dockerfile .
          docker push japilataxi/api-gateway:qa

      - name: Build and push Auth Service
        run: |
          docker build -t japilataxi/auth-service:qa -f apps/auth-service/Dockerfile .
          docker push japilataxi/auth-service:qa

      - name: Build and push Library Service
        run: |
          docker build -t japilataxi/library-service:qa -f apps/library-service/Dockerfile .
          docker push japilataxi/library-service:qa

      - name: Build and push Web App
        run: |
          docker build -t japilataxi/web-app:qa -f apps/web-app/Dockerfile .
          docker push japilataxi/web-app:qa

      - name: Deploy to QA EC2
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.QA_EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.QA_EC2_SSH_KEY }}
          script: |
            cd ~/smart-campus-module-3
            docker compose -f infra/docker/docker-compose.qa.deploy.yml pull
            docker compose -f infra/docker/docker-compose.qa.deploy.yml up -d
            docker image prune -f
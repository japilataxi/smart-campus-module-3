name: Library Service CI

on:
  push:
    branches:
      - feature/library-service
      - develop
      - qa
      - main
    paths:
      - "apps/library-service/**"
      - ".github/workflows/library-service-ci.yml"

  pull_request:
    branches:
      - develop
      - qa
      - main
    paths:
      - "apps/library-service/**"
      - ".github/workflows/library-service-ci.yml"

jobs:
  library-service-ci:
    name: Build and Test Library Service
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: apps/library-service

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/library-service/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run lint
        run: npm run lint
        continue-on-error: true

      - name: Run tests
        run: npm run test

      - name: Build service
        run: npm run build
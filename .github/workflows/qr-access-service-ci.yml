name: QR Access Service CI

on:
  push:
    branches:
      - feature/qr-access-service
      - feature/qr-access-transport-services
      - dev
      - qa
      - main
    paths:
      - "apps/qr-access-service/**"
      - "package.json"
      - "package-lock.json"
      - "turbo.json"
      - ".github/workflows/qr-access-service-ci.yml"

  pull_request:
    branches:
      - dev
      - qa
      - main
    paths:
      - "apps/qr-access-service/**"
      - "package.json"
      - "package-lock.json"
      - "turbo.json"
      - ".github/workflows/qr-access-service-ci.yml"

jobs:
  qr-access-service-ci:
    name: Build and Test QR Access Service
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npx turbo run test --filter=qr-access-service

      - name: Run e2e tests
        run: npm run test:e2e --workspace=qr-access-service

      - name: Build service
        run: npx turbo run build --filter=qr-access-service

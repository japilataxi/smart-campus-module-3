services:
  postgres:
    image: postgres:16-alpine
    container_name: smart-campus-postgres
    environment:
      POSTGRES_DB: smart_campus
      POSTGRES_USER: smart_campus
      POSTGRES_PASSWORD: smart_campus
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U smart_campus -d smart_campus"]
      interval: 10s
      timeout: 5s
      retries: 5

  library-db:
    image: postgres:16
    container_name: library-db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: library_db
    ports:
      - "5433:5432"
    volumes:
      - library_db_data:/var/lib/postgresql/data
  
  library-service:
    build:
      context: ./apps/library-service
    container_name: smart-campus-library-service
    restart: always
    environment:
      PORT: 3001
      DB_HOST: library-db
      DB_PORT: 5432
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      DB_NAME: library_db
      JWT_SECRET: smart-campus-library-secret
      JWT_EXPIRES_IN: 8h
    ports:
      - "3001:3001"
    depends_on:
      - library-db

  classroom-reservation-db:
    image: postgres:16
    container_name: classroom-reservation-db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: classroom_reservation_db
    ports:
      - "5434:5432"
    volumes:
      - classroom_reservation_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d classroom_reservation_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  classroom-reservation-service:
    build:
      context: ./apps/classroom-reservation-service
    container_name: smart-campus-classroom-reservation-service
    restart: always
    environment:
      PORT: 3002
      DATABASE_HOST: classroom-reservation-db
      DATABASE_PORT: 5432
      DATABASE_USER: postgres
      DATABASE_PASSWORD: postgres
      DATABASE_NAME: classroom_reservation_db
      JWT_SECRET: smart-campus-classroom-secret
      JWT_EXPIRES_IN: 8h
      CORS_ORIGIN: http://localhost:3000
    ports:
      - "3002:3002"
    depends_on:
      classroom-reservation-db:
        condition: service_healthy
      kafka:
          condition: service_healthy
      mqtt:
        condition: service_healthy
  
  redis:
    image: redis:7-alpine
    container_name: smart-campus-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  mqtt:
    image: eclipse-mosquitto:2
    container_name: smart-campus-mqtt
    ports:
      - "1883:1883"
    volumes:
      - ./docker/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 1883 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
  
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.1
    container_name: smart-campus-zookeeper
    restart: always
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
    ports:
      - "2181:2181"

  kafka:
    image: confluentinc/cp-kafka:7.6.1
    container_name: smart-campus-kafka
    restart: always
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics --bootstrap-server localhost:9092 --list > /dev/null 2>&1"]
      interval: 15s
      timeout: 10s
      retries: 10

volumes:
  postgres-data:
  redis-data:
  library_db_data:
  classroom_reservation_data:

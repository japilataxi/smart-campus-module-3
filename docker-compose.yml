services:
  postgres:
    image: postgres:16-alpine
    container_name: smart-campus-postgres
    environment:
      POSTGRES_DB: smart_campus
      POSTGRES_USER: smart_campus
      POSTGRES_PASSWORD: smart_campus
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U smart_campus -d smart_campus"]
      interval: 10s
      timeout: 5s
      retries: 5

  library-db:
    image: postgres:16
    container_name: library-db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: library_db
    ports:
      - "5433:5432"
    volumes:
      - library_db_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: smart-campus-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  mqtt:
    image: eclipse-mosquitto:2
    container_name: smart-campus-mqtt
    ports:
      - "1883:1883"
    volumes:
      - ./docker/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro

volumes:
  postgres-data:
  redis-data:
  library_db_data:


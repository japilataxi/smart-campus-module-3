services:
  
  transport-service:
    image: japilataxi/transport-service:qa
    container_name: smart-campus-transport-service-qa
    ports:
      - "3022:3022"
    environment:
      SERVICE_NAME: transport-service
      PORT: 3022
      DATABASE_URL: postgresql://transport_user:transport_password@transport-db:5432/transport_db
      REDIS_HOST: core3-redis
      REDIS_PORT: 6379
      RABBITMQ_URL: amqp://guest:guest@${RABBITMQ_HOST}:5672
      RABBITMQ_EXCHANGE: smart-campus.events
    depends_on:
      - transport-db
      - core3-redis
    restart: unless-stopped

  space-availability-service:
    image: japilataxi/space-availability-service:qa
    container_name: smart-campus-space-availability-service-qa
    ports:
      - "3023:3023"
    environment:
      SERVICE_NAME: space-availability-service
      NODE_ENV: development
      PORT: 3023
      DATABASE_URL: postgresql://space_user:space_password@space-availability-db:5432/space_availability_db
      REDIS_HOST: core3-redis
      REDIS_PORT: 6379
      RABBITMQ_URL: amqp://guest:guest@${RABBITMQ_HOST}:5672
      RABBITMQ_EXCHANGE: smart-campus.events
    depends_on:
      - space-availability-db
      - core3-redis
    restart: unless-stopped


  workflow-service:
    image: japilataxi/workflow-service:qa
    container_name: smart-campus-workflow-service-qa
    ports:
      - "3024:3024"
    environment:
      SERVICE_NAME: workflow-service
      NODE_ENV: development
      PORT: 3024
      DATABASE_URL: postgresql://workflow_user:workflow_password@workflow-db:5432/workflow_db
      REDIS_HOST: core3-redis
      REDIS_PORT: 6379
      JWT_SECRET: change_me
      N8N_BASE_URL: http://n8n:5678
      N8N_INCIDENT_WEBHOOK_URL: http://n8n:5678/webhook/incident-created-workflow
      N8N_USER_REGISTERED_WEBHOOK_URL: http://n8n:5678/webhook/user-registered-workflow
      N8N_LIBRARY_LOAN_WEBHOOK_URL: http://n8n:5678/webhook/library-loan-created-workflow
      N8N_CRITICAL_NOTIFICATION_WEBHOOK_URL: http://n8n:5678/webhook/critical-notification-workflow
    depends_on:
      - workflow-db
      - core3-redis
      - n8n
    restart: unless-stopped

  workflow-db:
    image: postgres:16
    container_name: smart-campus-workflow-db-qa
    environment:
      POSTGRES_DB: workflow_db
      POSTGRES_USER: workflow_user
      POSTGRES_PASSWORD: workflow_password
    volumes:
      - workflow_db_data:/var/lib/postgresql/data
    restart: unless-stopped

  n8n:
    image: n8nio/n8n:latest
    container_name: smart-campus-n8n-qa
    ports:
      - "5678:5678"
    environment:
      N8N_BASIC_AUTH_ACTIVE: "true"
      N8N_BASIC_AUTH_USER: admin
      N8N_BASIC_AUTH_PASSWORD: admin
      N8N_HOST: localhost
      N8N_PORT: 5678
      N8N_PROTOCOL: http
      WEBHOOK_URL: http://localhost:5678
    volumes:
      - n8n_data:/home/node/.n8n
    restart: unless-stopped
  transport-db:
    image: postgres:16
    container_name: smart-campus-transport-db-qa
    environment:
      POSTGRES_DB: transport_db
      POSTGRES_USER: transport_user
      POSTGRES_PASSWORD: transport_password
    volumes:
      - transport_db_data:/var/lib/postgresql/data
    restart: unless-stopped

  space-availability-db:
    image: postgres:16
    container_name: smart-campus-space-availability-db-qa
    environment:
      POSTGRES_DB: space_availability_db
      POSTGRES_USER: space_user
      POSTGRES_PASSWORD: space_password
    volumes:
      - space_availability_db_data:/var/lib/postgresql/data
    restart: unless-stopped

  core3-redis:
    image: redis:7-alpine
    container_name: smart-campus-core3-redis-qa
    restart: unless-stopped

volumes:
  transport_db_data:
  space_availability_db_data:
  workflow_db_data:
  n8n_data:
  announcement_db_data:

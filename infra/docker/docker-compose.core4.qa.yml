services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.1
    container_name: smart-campus-zookeeper-qa
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    restart: unless-stopped

  kafka:
    image: confluentinc/cp-kafka:7.6.1
    container_name: smart-campus-kafka-qa
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
      - "29092:29092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181

      KAFKA_LISTENERS: INTERNAL://0.0.0.0:29092,EXTERNAL://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:29092,EXTERNAL://10.10.11.40:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL

      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "kafka:29092"]
      interval: 20s
      timeout: 10s
      retries: 10
      start_period: 60s
    restart: unless-stopped

  announcement-service:
    image: japilataxi/announcement-service:qa
    container_name: smart-campus-announcement-service-qa
    ports:
      - "3007:3007"
    environment:
      SERVICE_NAME: announcement-service
      NODE_ENV: production
      PORT: 3007
      DATABASE_URL: postgresql://announcement_user:announcement_password@announcement-db:5432/announcement_db
      REDIS_HOST: core4-redis
      REDIS_PORT: 6379
      KAFKA_CLIENT_ID: announcement-service
      KAFKA_BROKERS: kafka:29092
      KAFKA_ANNOUNCEMENTS_TOPIC: campus.announcements
      JWT_SECRET: change_me
    depends_on:
      - announcement-db
      - core4-redis
      - kafka
    restart: unless-stopped

  event-service:
    image: japilataxi/event-service:qa
    container_name: smart-campus-event-service-qa
    ports:
      - "3030:3030"
    environment:
      SERVICE_NAME: event-service
      NODE_ENV: production
      PORT: 3030
      DATABASE_URL: postgresql://event_user:event_password@event-db:5432/event_db
      REDIS_HOST: core4-redis
      REDIS_PORT: 6379
      KAFKA_CLIENT_ID: event-service
      KAFKA_BROKERS: kafka:29092
      KAFKA_TOPIC: campus.events
      JWT_SECRET: change_me
    depends_on:
      - event-db
      - core4-redis
      - kafka
    restart: unless-stopped

  announcement-db:
    image: postgres:16
    container_name: smart-campus-announcement-db-qa
    environment:
      POSTGRES_DB: announcement_db
      POSTGRES_USER: announcement_user
      POSTGRES_PASSWORD: announcement_password
    volumes:
      - announcement_db_data:/var/lib/postgresql/data
    restart: unless-stopped

  event-db:
    image: postgres:16
    container_name: smart-campus-event-db-qa
    environment:
      POSTGRES_DB: event_db
      POSTGRES_USER: event_user
      POSTGRES_PASSWORD: event_password
    volumes:
      - event_db_data:/var/lib/postgresql/data
    restart: unless-stopped

  core4-redis:
    image: redis:7-alpine
    container_name: smart-campus-core4-redis-qa
    restart: unless-stopped

volumes:
  announcement_db_data:
  event_db_data:
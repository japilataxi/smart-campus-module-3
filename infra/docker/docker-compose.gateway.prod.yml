services:
  api-gateway:
    image: japilataxi/api-gateway:prod
    container_name: smart-campus-api-gateway-prod
    ports:
      - "3000:3000"
    environment:
      SERVICE_NAME: api-gateway
      PORT: 3000
      CORS_ORIGIN: ${CORS_ORIGIN}
      AUTH_SERVICE_URL: ${AUTH_SERVICE_URL}
      LIBRARY_SERVICE_URL: ${LIBRARY_SERVICE_URL}
      CAMPUS_INCIDENT_SERVICE_URL: ${CAMPUS_INCIDENT_SERVICE_URL}
      NOTIFICATION_SERVICE_URL: ${NOTIFICATION_SERVICE_URL}
      QR_ACCESS_SERVICE_URL: ${QR_ACCESS_SERVICE_URL}
      TRANSPORT_SERVICE_URL: ${TRANSPORT_SERVICE_URL}
      SPACE_AVAILABILITY_SERVICE_URL: ${SPACE_AVAILABILITY_SERVICE_URL}
      WORKFLOW_SERVICE_URL: ${WORKFLOW_SERVICE_URL}
      ANNOUNCEMENT_SERVICE_URL: ${ANNOUNCEMENT_SERVICE_URL}
      EVENT_SERVICE_URL: ${EVENT_SERVICE_URL}
    restart: unless-stopped




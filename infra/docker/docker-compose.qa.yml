services:

  api-gateway:
    build:
      context: ../../
      dockerfile: apps/api-gateway/Dockerfile
      args:
        APP_NAME: api-gateway
    ports:
      - "3000:3000"
    environment:
      SERVICE_NAME: api-gateway
      PORT: 3000
      AUTH_SERVICE_URL: http://auth-service:3001
      LIBRARY_SERVICE_URL: http://library-service:3002
      CAMPUS_INCIDENT_SERVICE_URL: http://campus-incident-service:3020
      NOTIFICATION_SERVICE_URL: http://notification-service:3010
      QR_ACCESS_SERVICE_URL: http://qr-access-service:3021
      TRANSPORT_SERVICE_URL: http://transport-service:3022
      SPACE_AVAILABILITY_SERVICE_URL: http://space-availability-service:3023
    depends_on:
      - auth-service
      - library-service
      - campus-incident-service
      - notification-service
      - qr-access-service
      - transport-service
      - space-availability-service

  auth-service:
    build:
      context: ../../
      dockerfile: apps/auth-service/Dockerfile
      args:
        APP_NAME: auth-service
    ports:
      - "3001:3001"
    environment:
      SERVICE_NAME: auth-service
      PORT: 3001
      DATABASE_URL: postgresql://auth_user:auth_password@auth-db:5432/auth_db
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: change_me
      JWT_REFRESH_SECRET: change_me_refresh
      ADMIN_EMAILS: kevin.amaguana@uce.edu.ec,japilataxi@uce.edu.ec,admin2026@uce.edu.ec
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672
      RABBITMQ_EXCHANGE: smart-campus.events
    depends_on:
      - auth-db
      - redis
      - rabbitmq

  library-service:
    build:
      context: ../../
      dockerfile: apps/library-service/Dockerfile
      args:
        APP_NAME: library-service
    ports:
      - "3002:3002"
    environment:
      SERVICE_NAME: library-service
      PORT: 3002
      DATABASE_URL: postgresql://library_user:library_password@library-db:5432/library_db
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: change_me
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672
      RABBITMQ_EXCHANGE: smart-campus.events
    depends_on:
      - library-db
      - redis
      - rabbitmq

  campus-incident-service:
    build:
      context: ../../
      dockerfile: apps/campus-incident-service/Dockerfile
      args:
        APP_NAME: campus-incident-service
    ports:
      - "3020:3020"
    environment:
      SERVICE_NAME: campus-incident-service
      PORT: 3020
      DATABASE_URL: postgresql://incident_user:incident_password@campus-incident-db:5432/campus_incidents_db
      JWT_SECRET: change_me
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672
      RABBITMQ_EXCHANGE: smart-campus.events
    depends_on:
      - campus-incident-db
      - rabbitmq

  notification-service:
    build:
      context: ../../
      dockerfile: apps/notification-service/Dockerfile
      args:
        APP_NAME: notification-service
    ports:
      - "3010:3010"
    environment:
      SERVICE_NAME: notification-service
      PORT: 3010
      DATABASE_URL: postgresql://notification_user:notification_password@notification-db:5432/notification_db
      REDIS_HOST: redis
      REDIS_PORT: 6379
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672
      RABBITMQ_EXCHANGE: smart-campus.events
      JWT_SECRET: change_me
    depends_on:
      - notification-db
      - redis
      - rabbitmq

  qr-access-service:
    build:
      context: ../../
      dockerfile: apps/qr-access-service/Dockerfile
      args:
        APP_NAME: qr-access-service
    ports:
      - "3021:3021"
    environment:
      SERVICE_NAME: qr-access-service
      PORT: 3021
      DATABASE_URL: postgresql://qr_access_user:qr_access_password@qr-access-db:5432/qr_access_db
      REDIS_HOST: redis
      REDIS_PORT: 6379
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672
      RABBITMQ_EXCHANGE: smart-campus.events
      JWT_SECRET: change_me
    depends_on:
      - qr-access-db
      - redis
      - rabbitmq


  transport-service:
    build:
      context: ../../
      dockerfile: apps/transport-service/Dockerfile
      args:
        APP_NAME: transport-service
    ports:
      - "3022:3022"
    environment:
      SERVICE_NAME: transport-service
      PORT: 3022
      DATABASE_URL: postgresql://transport_user:transport_password@transport-db:5432/transport_db
      REDIS_HOST: redis
      REDIS_PORT: 6379
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672
      RABBITMQ_EXCHANGE: smart-campus.events
      JWT_SERVICE: change_me
    depends_on:
      - transport-db
      - redis
      - rabbitmq

  space-availability-service:
    build:
      context: ../../
      dockerfile: apps/space-availability-service/Dockerfile
      args:
        APP_NAME: space-availability-service
    ports:
      - "3023:3023"
    environment:
      SERVICE_NAME: space-availability-service
      PORT: 3023
      NODE_ENV: development
      DATABASE_URL: postgresql://space_user:space_password@space-availability-db:5432/space_availability_db
      REDIS_HOST: redis
      REDIS_PORT: 6379
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672
      RABBITMQ_EXCHANGE: smart-campus.events
      JWT_SERVICE: change_me
    depends_on:
      - space-availability-db
      - redis
      - rabbitmq

  web-app:
    build:
      context: ../../
      dockerfile: apps/web-app/Dockerfile
    ports:
      - "3003:3003"
    environment:
      PORT: 3003
      HOSTNAME: 0.0.0.0
      NEXT_PUBLIC_API_URL: http://localhost:3000/api
    depends_on:
      - api-gateway

  auth-db:
    image: postgres:16
    environment:
      POSTGRES_DB: auth_db
      POSTGRES_USER: auth_user
      POSTGRES_PASSWORD: auth_password
    ports:
      - "5433:5432"

  library-db:
    image: postgres:16
    environment:
      POSTGRES_DB: library_db
      POSTGRES_USER: library_user
      POSTGRES_PASSWORD: library_password
    ports:
      - "5434:5432"

  campus-incident-db:
    image: postgres:16
    environment:
      POSTGRES_DB: campus_incidents_db
      POSTGRES_USER: incident_user
      POSTGRES_PASSWORD: incident_password
    ports:
      - "5436:5432"

  notification-db:
    image: postgres:16
    environment:
      POSTGRES_DB: notification_db
      POSTGRES_USER: notification_user
      POSTGRES_PASSWORD: notification_password
    ports:
      - "5435:5432"

  qr-access-db:
    image: postgres:16
    environment:
      POSTGRES_DB: qr_access_db
      POSTGRES_USER: qr_access_user
      POSTGRES_PASSWORD: qr_access_password
    ports:
      - "5437:5432"

  transport-db:
    image: postgres:16
    environment:
      POSTGRES_DB: transport_db
      POSTGRES_USER: transport_user
      POSTGRES_PASSWORD: transport_password
    ports:
      - "5438:5432"
      
  space-availability-db:
    image: postgres:16
    environment:
      POSTGRES_DB: space_availability_db
      POSTGRES_USER: space_user
      POSTGRES_PASSWORD: space_password
    ports:
      - "5439:5432"
  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: smart-campus-rabbitmq-qa
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
      RABBITMQ_ERLANG_COOKIE: smart-campus-cookie
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_running"]
      interval: 10s
      timeout: 30s
      retries: 5
      start_period: 30s

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  prometheus:
    image: prom/prometheus
    ports:
      - "9090:9090"
    volumes:
      - ../monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
    depends_on:
      - api-gateway
      - auth-service
      - library-service
      - campus-incident-service
      - notification-service
      - qr-access-service
      - transport-service
      - space-availability-service

  grafana:
    image: grafana/grafana
    ports:
      - "3005:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    depends_on:
      - prometheus




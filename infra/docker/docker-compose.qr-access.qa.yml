services:
  qr-access-db:
    image: postgres:16
    container_name: smart-campus-qr-access-db-qa
    environment:
      POSTGRES_DB: qr_access_db
      POSTGRES_USER: qr_access_user
      POSTGRES_PASSWORD: qr_access_password
    volumes:
      - qr_access_db_data:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: smart-campus-qr-access-redis-qa
    restart: unless-stopped

  qr-access-service:
    image: japilataxi/qr-access-service:qa
    container_name: smart-campus-qr-access-service-qa
    ports:
      - "3021:3021"
    environment:
      SERVICE_NAME: qr-access-service
      PORT: 3021
      DATABASE_URL: postgresql://qr_access_user:qr_access_password@qr-access-db:5432/qr_access_db
      REDIS_HOST: redis
      REDIS_PORT: 6379
      RABBITMQ_URL: ${RABBITMQ_URL}
      RABBITMQ_EXCHANGE: smart-campus.events
      JWT_SECRET: change_me
    depends_on:
      - qr-access-db
      - redis
    restart: unless-stopped

volumes:
  qr_access_db_data:
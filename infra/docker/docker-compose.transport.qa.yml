services:
  transport-db:
    image: postgres:16
    container_name: smart-campus-transport-db-qa
    environment:
      POSTGRES_DB: transport_db
      POSTGRES_USER: transport_user
      POSTGRES_PASSWORD: transport_password
    volumes:
      - transport_db_data:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: smart-campus-transport-redis-qa
    restart: unless-stopped

  transport-service:
    image: japilataxi/transport-service:qa
    container_name: smart-campus-transport-service-qa
    ports:
      - "3022:3022"
    environment:
      SERVICE_NAME: transport-service
      PORT: 3022
      DATABASE_URL: postgresql://transport_user:transport_password@transport-db:5432/transport_db
      REDIS_HOST: redis
      REDIS_PORT: 6379
      RABBITMQ_URL: ${RABBITMQ_URL}
      RABBITMQ_EXCHANGE: smart-campus.events
      JWT_SECRET: change_me
    depends_on:
      - transport-db
      - redis
    restart: unless-stopped

volumes:
  transport_db_data: